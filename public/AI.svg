<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a"></stop>
<stop offset="100%" stop-color="#1e3a8a"></stop>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.5"></feDropShadow>
</filter>
</defs>

<rect width="1200" height="700" fill="url(#bg)"></rect>

<text x="60" y="100" fill="white" font-size="48" font-family="Arial" font-weight="bold">
AI Task Manager
</text>

<!-- glass cards -->
<rect x="80" y="160" width="320" height="420" rx="25" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" filter="url(#shadow)"></rect>

<rect x="440" y="160" width="320" height="420" rx="25" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"></rect>

<rect x="800" y="160" width="320" height="420" rx="25" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)"></rect>

<!-- AI badge -->
<circle cx="1060" cy="120" r="35" fill="#38bdf8"></circle>
<text x="1042" y="128" fill="white" font-size="16">AI</text>
</svg>