name: Open Cross-Fork PRs

on:
  workflow_dispatch:

jobs:
  open-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open PR 1 - safeJsonParseFromStorage SSR guard
        run: |
          echo "Creating PR for safeJsonParseFromStorage..."
          node -e "
          const https = require('https');
          const data = JSON.stringify({
            title: 'fix(utils): add SSR guard to safeJsonParseFromStorage (Closes #84)',
            head: 'tmdeveloper007:fix/safeJsonParseFromStorage-SSR-84',
            base: 'master',
            body: '## Summary\n\nAdds an SSR guard (`typeof window === \"undefined\"`) at the start of `safeJsonParseFromStorage()` in `src/utils/safeJsonParse.js`. The function accessed `localStorage` directly, causing a runtime crash in Node.js/SSR environments.\n\n## Changes\n\n- src/utils/safeJsonParse.js: Added SSR guard\n\n## Impact\n\n- Fixes runtime crash in SSR/Node.js environments\n- No behavioral change for browser clients\n\nCloses #84'
          });
          const options = {
            hostname: 'api.github.com',
            path: '/repos/SandeepVashishtha/Eventra/pulls',
            method: 'POST',
            headers: {
              'Authorization': 'token ' + process.env.GITHUB_TOKEN,
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github.v3+json'
            }
          };
          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              const result = JSON.parse(body);
              if (result.number) {
                console.log('PR #' + result.number + ' created: ' + result.html_url);
              } else {
                console.log('Error: ' + JSON.stringify(result));
              }
            });
          });
          req.write(data);
          req.end();
          " || echo "PR creation via API failed"

