name: Open Cross-Fork PRs

on:
  workflow_dispatch:

jobs:
  open-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open all 5 PRs
        run: |
          set -e
          
          # Helper function for creating PR via GitHub API
          create_pr() {
            local title="$1"
            local body="$2"
            local head="$3"
            echo "Creating PR: $title"
            local response
            response=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "User-Agent: tmdeveloper007" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$(jq -n --arg title "$title" --arg body "$body" --arg head "$head" \
                '{title: $title, body: $body, head: $head, base: "master"}')" \
              "https://api.github.com/repos/SandeepVashishtha/Eventra/pulls")
            echo "Response: $response"
            if echo "$response" | grep -q '"number"'; then
              echo "SUCCESS: PR created"
            else
              echo "ERROR: $response"
            fi
          }
          
          # PR 1: safeJsonParseFromStorage SSR guard
          create_pr \
            "fix(utils): add SSR guard to safeJsonParseFromStorage (Closes #84)" \
            "## Summary

Adds an SSR guard (\`typeof window === 'undefined'\`) at the start of \`safeJsonParseFromStorage()\` in \`src/utils/safeJsonParse.js\`. The function accessed \`localStorage\` directly, causing a runtime crash in Node.js/SSR environments.

## Changes

- src/utils/safeJsonParse.js: Added SSR guard

## Impact

- Fixes runtime crash in SSR/Node.js environments
- No behavioral change for browser clients

Closes #84" \
            "tmdeveloper007:fix/safeJsonParseFromStorage-SSR-84"
          
          # PR 2: eventTemplateUtils SSR guards
          create_pr \
            "fix(utils): add SSR guards to eventTemplateUtils localStorage access (Closes #85)" \
            "## Summary

Adds SSR guards to all functions in src/utils/eventTemplateUtils.js that access localStorage.

## Changes

- Added isStorageAvailable() helper
- Added guards to getTemplates(), saveTemplate(), deleteTemplate(), clearAllTemplates()

## Impact

- Fixes runtime crash in SSR/Node.js environments

Closes #85" \
            "tmdeveloper007:fix/eventTemplateUtils-SSR-85"
          
          # PR 3: securityHeadersDiagnostics SSR guard
          create_pr \
            "fix(utils): add SSR guard to securityHeadersDiagnostics document access (Closes #88)" \
            "## Summary

Adds SSR guard to getSecurityHeadersDiagnostics() in src/utils/securityHeadersDiagnostics.js.

## Changes

- Returns graceful SSR fallback instead of crashing on document.querySelector

## Impact

- Fixes runtime crash in SSR/Node.js environments

Closes #88" \
            "tmdeveloper007:fix/securityHeadersDiagnostics-SSR-88"
          
          # PR 4: sessionManager SSR guards
          create_pr \
            "fix(utils): add SSR guards to sessionManager localStorage/sessionStorage access (Closes #87)" \
            "## Summary

Adds SSR guards to clearAuthStorage() and isSessionValid() in src/utils/sessionManager.js.

## Changes

- Added typeof window guard to both functions

## Impact

- Fixes runtime crash in SSR/Node.js environments

Closes #87" \
            "tmdeveloper007:fix/sessionManager-SSR-87"
          
          # PR 5: rateLimitUtils SSR guards
          create_pr \
            "fix(utils): add SSR guards to rateLimitUtils sessionStorage access (Closes #86)" \
            "## Summary

Adds SSR guards to readPersistedRateLimit(), persistRateLimit(), and clearPersistedRateLimit() in src/utils/rateLimitUtils.js.

## Changes

- Added isSessionStorageAvailable() helper
- Added guards to all sessionStorage-accessing functions

## Impact

- Fixes runtime crash in SSR/Node.js environments

Closes #86" \
            "tmdeveloper007:fix/rateLimitUtils-SSR-86"
